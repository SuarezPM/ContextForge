apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-to-redis
spec:
  podSelector:
    matchLabels:
      apohara.dev/role: worker
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          apohara.dev/role: redis
    ports:
    - port: 6379
      protocol: TCP
  # DNS resolution — scoped to kube-system / kube-dns only (Sprint 4
  # hardening). The earlier `namespaceSelector: {}` allowed DNS queries to
  # any pod on port 53 in any namespace, enabling DNS-as-side-channel
  # exfiltration in hostile multi-tenant clusters.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
