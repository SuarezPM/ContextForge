apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apohara-contextforge-leader-election-role
  namespace: system
rules:
# Standard controller-runtime leader election does not require `delete` on
# configmaps or leases — the controller never tears these down. Tight verb
# set follows the principle of least privilege.
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
