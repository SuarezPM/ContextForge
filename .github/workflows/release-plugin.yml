# Release workflow for apohara-vllm-plugin.
#
# Triggers on tags of the form `vllm-plugin-v*` (e.g.
# `vllm-plugin-v0.1.0`). Builds the wheel + sdist, validates with
# twine, smoke-tests the entry-point in a clean venv, and publishes
# to PyPI via OIDC trusted publishing (no API token required).
#
# See pypi/apohara-vllm-plugin/PUBLISH.md for the one-time PyPI
# trusted-publisher setup.

name: release-plugin

on:
  push:
    tags:
      - "vllm-plugin-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing (OIDC)

jobs:
  # --------------------------------------------------------------------- #
  # Build the wheel + sdist on a fresh ubuntu runner and validate.         #
  # --------------------------------------------------------------------- #
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build
        working-directory: pypi/apohara-vllm-plugin
        run: python -m build --wheel --sdist

      - name: twine check
        working-directory: pypi/apohara-vllm-plugin
        run: twine check dist/*

      - name: Smoke-test entry-point discoverability
        working-directory: pypi/apohara-vllm-plugin
        run: |
          python -m venv /tmp/smoke
          source /tmp/smoke/bin/activate
          pip install --no-deps -e ../..
          pip install --no-deps dist/apohara_vllm_plugin-*.whl
          pip install numpy prometheus-client pydantic pydantic-settings pytest
          pytest tests/ -v
          python -c "
          import importlib.metadata as md
          eps = list(md.entry_points(group='vllm.general_plugins'))
          assert any(e.name == 'apohara_contextforge' for e in eps), eps
          fn = next(e for e in eps if e.name == 'apohara_contextforge').load()
          plugin = fn()
          assert plugin.is_initialized()
          print('OK: entry-point discoverable + plugin initialised')
          "

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: apohara-vllm-plugin-dist
          path: pypi/apohara-vllm-plugin/dist/*

  # --------------------------------------------------------------------- #
  # Publish to TestPyPI on any successful build of a vllm-plugin-v* tag,  #
  # OR when the workflow is dispatched manually with target=testpypi.     #
  # --------------------------------------------------------------------- #
  testpypi:
    name: publish → TestPyPI
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/vllm-plugin-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/apohara-vllm-plugin/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: apohara-vllm-plugin-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  # --------------------------------------------------------------------- #
  # Publish to PyPI proper. Gated on the testpypi job to keep the         #
  # release pipeline staged. Manual dispatch with target=pypi skips the   #
  # testpypi step (for hotfixes that have already been validated).        #
  # --------------------------------------------------------------------- #
  pypi:
    name: publish → PyPI
    needs: [build, testpypi]
    if: |
      startsWith(github.ref, 'refs/tags/vllm-plugin-v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/apohara-vllm-plugin/
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: apohara-vllm-plugin-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
