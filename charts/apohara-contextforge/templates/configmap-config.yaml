apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apohara-contextforge.fullname" . }}-config
  labels:
    {{- include "apohara-contextforge.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "model": {{ .Values.model | quote }},
      "lmcache_redis_url": {{ include "apohara-contextforge.redisUrl" . | quote }},
      "gpu_type": {{ .Values.gpuType | quote }},
      "chunk_size": {{ .Values.config.chunkSize }},
      "local_device": {{ .Values.config.localDevice | quote }},
      "blocking_store": {{ .Values.config.blockingStore }},
      "blocking_retrieve": {{ .Values.config.blockingRetrieve }}
    }
